<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polymarket Bot Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e17;
            color: #e0e6ed;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #00d4aa;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .subtitle {
            font-size: 14px;
            color: #8892b0;
            margin-bottom: 30px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .card {
            background: #141c2b;
            border-radius: 12px;
            padding: 18px 20px;
            border: 1px solid #1f2a3f;
            transition: 0.2s;
        }
        .card:hover { border-color: #2a3a5a; }
        .card .label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #8892b0;
        }
        .card .value {
            font-size: 28px;
            font-weight: 700;
            margin-top: 4px;
        }
        .card .value.green { color: #00d4aa; }
        .card .value.red { color: #ff6b6b; }
        .card .value.gold { color: #fbbf24; }
        .card .value.white { color: #e0e6ed; }

        .two-col {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }
        @media (max-width: 768px) { .two-col { grid-template-columns: 1fr; } }

        .panel {
            background: #141c2b;
            border-radius: 12px;
            padding: 18px 20px;
            border: 1px solid #1f2a3f;
        }
        .panel h3 {
            font-size: 16px;
            margin-bottom: 12px;
            color: #ccd6f6;
        }
        .panel .sub {
            font-size: 12px;
            color: #8892b0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        th {
            text-align: left;
            padding: 8px 6px;
            color: #8892b0;
            font-weight: 500;
            border-bottom: 1px solid #1f2a3f;
        }
        td {
            padding: 8px 6px;
            border-bottom: 1px solid #1a2335;
        }
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        .badge.running { background: #00d4aa22; color: #00d4aa; }
        .badge.stopped { background: #ff6b6b22; color: #ff6b6b; }
        .badge.unknown { background: #fbbf2422; color: #fbbf24; }
        .badge.buy { background: #00d4aa22; color: #00d4aa; }
        .badge.sell { background: #ff6b6b22; color: #ff6b6b; }

        .log-box {
            background: #0a0e17;
            border-radius: 8px;
            padding: 12px;
            max-height: 180px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
            color: #8892b0;
            line-height: 1.6;
        }
        .log-box .log-entry { color: #c0c8d8; }
        .log-box .log-error { color: #ff6b6b; }
        .log-box .log-warn { color: #fbbf24; }
        .log-box .log-success { color: #00d4aa; }

        .chart-container {
            position: relative;
            height: 160px;
        }

        .refresh-btn {
            background: #00d4aa22;
            border: 1px solid #00d4aa44;
            color: #00d4aa;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
        }
        .refresh-btn:hover {
            background: #00d4aa44;
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .mt-12 { margin-top: 12px; }
        .mb-8 { margin-bottom: 8px; }
    </style>
</head>
<body>
<div class="container">
    <div class="flex-between">
        <div>
            <h1>📊 Polymarket Bot Dashboard</h1>
            <div class="subtitle">Monitoring bot trading — <span id="update-time">Memuat...</span></div>
        </div>
        <button class="refresh-btn" onclick="refreshData()">⟳ Refresh</button>
    </div>

    <!-- Cards Ringkasan -->
    <div class="grid" id="summary-cards">
        <div class="card"><div class="label">💰 Saldo</div><div class="value green" id="balance">-</div></div>
        <div class="card"><div class="label">📈 Total P&L</div><div class="value" id="pnl">-</div></div>
        <div class="card"><div class="label">📊 Profit %</div><div class="value gold" id="pnl-percent">-</div></div>
        <div class="card"><div class="label">📦 Posisi Terbuka</div><div class="value white" id="position-count">-</div></div>
        <div class="card"><div class="label">🏆 Win Rate</div><div class="value green" id="win-rate">-</div></div>
        <div class="card"><div class="label">🔄 Status Bot</div><div class="value" id="bot-status">-</div></div>
    </div>

    <!-- Baris: Chart + Log -->
    <div class="two-col">
        <div class="panel">
            <h3>📈 P&L Over Time <span class="sub">(simulasi)</span></h3>
            <div class="chart-container">
                <canvas id="pnlChart"></canvas>
            </div>
        </div>
        <div class="panel">
            <h3>📋 Log Terbaru</h3>
            <div class="log-box" id="log-box">
                <div class="log-entry">⏳ Memuat log...</div>
            </div>
        </div>
    </div>

    <!-- Tabel Posisi -->
    <div class="panel">
        <h3>📦 Posisi Terbuka</h3>
        <div style="overflow-x:auto;">
            <table>
                <thead>
                    <tr>
                        <th>Market</th>
                        <th>Side</th>
                        <th>Shares</th>
                        <th>Avg Price</th>
                        <th>Entry Value</th>
                    </tr>
                </thead>
                <tbody id="positions-body">
                    <tr><td colspan="5" style="text-align:center;color:#8892b0;">Tidak ada posisi</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let pnlChart = null;

    async function fetchData() {
        try {
            const res = await fetch('/api/data');
            const data = await res.json();

            // Update cards
            document.getElementById('balance').innerText = '$' + data.balance.toFixed(2);
            const pnlEl = document.getElementById('pnl');
            pnlEl.innerText = (data.total_pnl >= 0 ? '+' : '') + data.total_pnl.toFixed(2);
            pnlEl.className = 'value ' + (data.total_pnl >= 0 ? 'green' : 'red');

            document.getElementById('pnl-percent').innerText = (data.pnl_percent >= 0 ? '+' : '') + data.pnl_percent.toFixed(1) + '%';
            document.getElementById('position-count').innerText = data.positions.length;
            document.getElementById('win-rate').innerText = data.win_rate.toFixed(1) + '%';
            document.getElementById('update-time').innerText = 'Update: ' + new Date().toLocaleTimeString();

            // Status bot
            const statusEl = document.getElementById('bot-status');
            const statusText = data.bot_status || 'unknown';
            const statusMap = {
                'running': '🟢 Running',
                'stopped': '🔴 Stopped',
                'unknown': '🟡 Unknown'
            };
            statusEl.innerText = statusMap[statusText] || statusText;
            statusEl.className = 'value badge ' + statusText;

            // Chart
            if (!pnlChart) {
                const ctx = document.getElementById('pnlChart').getContext('2d');
                pnlChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: ['', '', '', '', '', '', ''],
                        datasets: [{
                            label: 'P&L',
                            data: [0, 0, 0, 0, 0, 0, 0],
                            borderColor: '#00d4aa',
                            backgroundColor: 'rgba(0,212,170,0.1)',
                            tension: 0.3,
                            fill: true,
                            pointRadius: 2
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            x: { grid: { color: '#1f2a3f' }, ticks: { color: '#8892b0', font: { size: 9 } } },
                            y: { grid: { color: '#1f2a3f' }, ticks: { color: '#8892b0', font: { size: 9 } } }
                        }
                    }
                });
            }

            // Update chart dengan data dummy (simulasi P&L dari balance)
            // Kita akan generate data sepanjang waktu untuk visualisasi
            // Untuk demo, kita gunakan data dari total P&L
            const pnlValue = data.total_pnl;
            const baseValue = data.balance - pnlValue;
            // Buat 7 titik data: dari base ke current
            const points = [];
            for (let i = 0; i < 7; i++) {
                const progress = i / 6;
                const val = baseValue + (pnlValue * progress);
                points.push(val);
            }
            pnlChart.data.datasets[0].data = points;
            pnlChart.update();

            // Update positions table
            const tbody = document.getElementById('positions-body');
            if (data.positions.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#8892b0;">Tidak ada posisi</td></tr>';
            } else {
                tbody.innerHTML = data.positions.map(p => `
                    <tr>
                        <td>${p.market_id.slice(0, 12)}...</td>
                        <td><span class="badge ${p.side === 'YES' ? 'buy' : 'sell'}">${p.side}</span></td>
                        <td>${p.shares.toFixed(2)}</td>
                        <td>$${p.avg_price.toFixed(4)}</td>
                        <td>$${p.entry_value.toFixed(2)}</td>
                    </tr>
                `).join('');
            }

            // Update log
            const logBox = document.getElementById('log-box');
            if (data.recent_logs && data.recent_logs.length > 0) {
                logBox.innerHTML = data.recent_logs.slice(-15).map(line => {
                    let cls = 'log-entry';
                    if (line.includes('ERROR') || line.includes('❌')) cls = 'log-error';
                    else if (line.includes('WARN') || line.includes('⚠️')) cls = 'log-warn';
                    else if (line.includes('✅')) cls = 'log-success';
                    return `<div class="${cls}">${line}</div>`;
                }).join('');
            } else {
                logBox.innerHTML = '<div class="log-entry">📭 Belum ada log</div>';
            }

        } catch (e) {
            console.error(e);
        }
    }

    function refreshData() {
        fetchData();
        document.getElementById('update-time').innerText = '⏳ Memuat...';
    }

    // Auto refresh setiap 10 detik
    fetchData();
    setInterval(fetchData, 10000);
</script>
</body>
</html>
